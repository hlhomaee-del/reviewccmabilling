<style>

<script>
/* === STATE === */
const S=JSON.parse(localStorage.getItem('ccma')||'{}');
function ss(){localStorage.setItem('ccma',JSON.stringify(S))}
if(!S.lc)S.lc=[];if(!S.fc)S.fc={};if(!S.pa)S.pa={};if(!S.ca)S.ca={};if(!S.pf)S.pf={};if(!S.cf)S.cf={};

function fmtR(txt){
 if(!txt)return'';
 const raw=String(txt).replace(/<br\s*\/?>(?=\s*<b>|\s*[A-D]\s*[:(])/gi,'\n').replace(/<br\s*\/?>/gi,'\n');
 const parts=raw.split(/\n+/).map(x=>x.trim()).filter(Boolean);
 let out='<div class="rwrap"><div class="rhead">🧠 Rationale: read the clue, then eliminate with a reason</div>';
 parts.forEach((part,idx)=>{
   const plain=part.replace(/<[^>]*>/g,'');
   const isChoice=/^\s*[A-D]\s*[:(]/.test(plain);
   const good=idx===0 || /correct|yes|right answer/i.test(plain);
   const bad=isChoice && !good;
   out+=`<div class="rline ${good?'good':bad?'bad':''}">${part}</div>`;
 });
 out+='</div>';
 return out;
}

const LS=[
{t:'Insurance Fundamentals',i:'🛡️',cl:'var(--royal)',
c:`<h3>🛡️ Insurance Fundamentals</h3>
<p><b>Premium:</b> Monthly payment to maintain coverage.</p>
<p><b>Deductible:</b> Amount patient pays yearly before insurance covers costs. Example: $1,000 deductible = patient pays first $1,000.</p>
<p><b>Copayment:</b> Fixed amount per visit ($25, $40). Collected at check-in.</p>
<p><b>Coinsurance:</b> Percentage patient pays after deductible. Example: 20% coinsurance = patient pays 20%, plan pays 80%.</p>
<p><b>Out-of-Pocket Maximum:</b> Most patient pays per year. After this, plan pays 100%.</p>
<p><b>Allowed Amount:</b> Maximum payer will pay (negotiated rate). Patient responsibility is based on this, NOT billed amount.</p>
<p><b>Billed Amount:</b> What the provider charges (often higher than allowed).</p>
<p><b>EOB:</b> Payer statement showing how claim was processed. NOT a bill.</p>
<p><b>Third-Party Payer:</b> Entity other than patient/provider that pays (insurance company, Medicare, Medicaid).</p>
<p><b>Coordination of Benefits:</b> When patient has 2+ plans, COB determines which pays first (primary) and second (secondary).</p>
<div class="ec"><h4 style="color:var(--gold)">💡 Math Example</h4><p>Billed: $500 | Allowed: $350 | Deductible remaining: $100 | Coinsurance: 20%</p><div class="er"><span>Patient pays deductible</span><span>$100</span></div><div class="er"><span>Remaining: $350-$100</span><span>$250</span></div><div class="er"><span>Patient coinsurance: 20% × $250</span><span>$50</span></div><div class="er"><span>Insurance pays: 80% × $250</span><span>$200</span></div><div class="er"><span>Contractual adjustment: $500-$350</span><span>$150</span></div><div class="er tot"><span>Patient total</span><span>$150</span></div></div>
<div class="ib ex"><h4>📝 Exam Tip</h4><p>Calculate patient responsibility from the ALLOWED amount, not billed. The difference between billed and allowed is a contractual adjustment.</p></div>
<div class="ib tr"><h4>⚠️ Trap</h4><p>Do not confuse billed with allowed amount. Patient responsibility is always based on the allowed amount.</p></div>`,
q:{q:'Patient has $2,000 deductible, paid $1,800. Allowed amount: $300. Coinsurance: 20%. What does patient owe?',o:['$200','$260','$300','$60'],a:1,r:'<b>B ($260).</b> Remaining deductible: $2,000-$1,800=$200. Patient pays $200 deductible. Remaining: $300-$200=$100. Coinsurance: 20%×$100=$20. Total: $200+$20=$260.<br><b>A:</b> Only the deductible, ignoring coinsurance.<br><b>C:</b> Full allowed—insurance covers its share.<br><b>D:</b> 20% of $300, ignoring deductible.'}},
{t:'Plan Types',i:'📋',cl:'var(--teal)',
c:`<h3>📋 Plan Types</h3>
<p><b>HMO:</b> Requires PCP, referrals for specialists. No out-of-network except emergencies. Lower cost.</p>
<p><b>PPO:</b> No referral needed. In-network and out-of-network coverage. Out-of-network costs more. Higher premiums.</p>
<p><b>EPO:</b> No referrals. In-network ONLY (except emergencies). "Exclusive."</p>
<p><b>POS:</b> Combines HMO+PPO. Needs PCP and referrals, but some out-of-network access at higher cost.</p>
<p><b>HDHP:</b> High deductible, low premiums. Often paired with HSA.</p>
<p><b>Medicare:</b> Federal, primarily 65+ or qualifying disabilities.</p>
<p><b>Medicaid:</b> Federal/state, income-based. Varies by state.</p>
<p><b>Workers' Comp:</b> Covers work-related injuries. Employer pays premiums.</p>
<div class="g" style="background:rgba(20,184,166,.08)"><h4>🧭 Decision Chart</h4>
<div class="dc2"><b>→</b><span>Needs referral for specialist → <b>HMO or POS</b></span></div>
<div class="dc2"><b>→</b><span>Wants out-of-network flexibility → <b>PPO</b></span></div>
<div class="dc2"><b>→</b><span>No out-of-network except emergencies, no referral → <b>EPO</b></span></div>
<div class="dc2"><b>→</b><span>High deductible before coverage → <b>HDHP</b></span></div>
<div class="dc2"><b>→</b><span>Injured at work → <b>Workers' Comp</b></span></div></div>
<div class="ib tr"><h4>⚠️ Trap</h4><p>EPO and HMO both restrict out-of-network, but EPO does NOT require referrals. HMO does.</p></div>`,

{t:'Medicare & Medicaid',i:'🏛️',cl:'var(--purple)',

{t:'ICD-10-CM Coding',i:'🔢',cl:'var(--emerald)',
c:`<h3>🔢 ICD-10-CM Diagnosis Coding</h3>
<p>ICD-10-CM codes identify <b>WHY</b> the patient was seen — diagnosis, condition, symptom, reason.</p>
<p>• Confirmed diagnosis documented → code the diagnosis.</p>
<p>• No confirmed diagnosis → code signs/symptoms.</p>

{t:'CPT Procedure Coding',i:'⚙️',cl:'var(--orange)',

{t:'Modifiers',i:'🏷️',cl:'var(--pink)',

<tr><td><b>52</b></td><td>Reduced services</td></tr>
<tr><td><b>76</b></td><td>Repeat procedure, same provider</td></tr>
<tr><td><b>77</b></td><td>Repeat procedure, different provider</td></tr>
<tr><td><b>RT/LT</b></td><td>Right side / Left side</td></tr></table>
<h4>Anatomical Modifiers</h4>
<table class="mt"><tr><th>Eyelids</th><th></th></tr><tr><td>E1</td><td>Upper left</td></tr><tr><td>E2</td><td>Lower left</td></tr><tr><td>E3</td><td>Upper right</td></tr><tr><td>E4</td><td>Lower right</td></tr></table>
<table class="mt"><tr><th>Fingers</th><th>Left</th><th>Right</th></tr>

{t:'Referrals & Prior Auth',i:'📝',cl:'var(--teal)',
c:`<h3>📝 Referrals, Prior Auth & Precertification</h3>
<p><b>Referral:</b> PCP order/permission to see specialist. Required by HMO and POS.</p>
<p><b>Prior Authorization:</b> Payer approval BEFORE service (imaging, DME, surgery, meds).</p>
<p><b>Precertification:</b> Advance confirmation service meets payer requirements.</p>
<p><b>Key:</b> Authorization is NOT a guarantee of payment.</p>
<div class="g" style="background:rgba(20,184,166,.06)"><h4>🌳 Decision Tree</h4>
<div class="dc2"><b>→</b><span>HMO + specialist → <b>Referral likely needed</b></span></div>
<div class="dc2"><b>→</b><span>MRI ordered → <b>Prior auth likely needed</b></span></div>
<div class="dc2"><b>→</b><span>DME (CPAP, wheelchair) → <b>Prior auth may be needed</b></span></div>
<div class="dc2"><b>→</b><span>Rx not on formulary → <b>Prior auth or alternative needed</b></span></div></div>
<div class="ib tr"><h4>⚠️ Trap</h4><p>Prior authorization does NOT guarantee payment. PPOs typically do NOT require referrals.</p></div>`,
q:{q:'Provider orders MRI for PPO patient. What should MA verify before scheduling?',o:['PCP referral','Prior authorization from payer','Out-of-pocket maximum','Switch to HMO'],a:1,r:'<b>B.</b> Many payers require prior auth for MRIs regardless of plan type.<br><b>A:</b> PPOs do not require referrals.<br><b>C:</b> OOP max affects cost, not auth requirement.<br><b>D:</b> Switching plans is not an MA action.'}},
{t:'ABN & Medical Necessity',i:'⚠️',cl:'var(--gold)',
c:`<h3>⚠️ ABN & Medical Necessity</h3>
<p><b>ABN:</b> Advanced Beneficiary Notice — given to <b>Medicare</b> patient BEFORE service that Medicare may not cover because it may not be medically necessary.</p>
<p>• Must be given BEFORE the service</p>
<p>• Medicare-specific (not for commercial plans)</p>
<p>• Patient decides whether to proceed knowing they may pay</p>
<p><b>Medical Necessity:</b> Payer requires service be reasonable and necessary for the diagnosis/treatment.</p>
<div class="ib tr"><h4>⚠️ Trap</h4><p>ABN = Medicare ONLY. Must be signed BEFORE the service, not after.</p></div>`,
q:{q:'When must an ABN be presented to a Medicare patient?',o:['After service and denial','Before service when Medicare may not cover it','Only when patient requests','For commercial PPO plans'],a:1,r:'<b>B.</b> ABN must be given BEFORE so patient can decide.<br><b>A:</b> After defeats the purpose.<br><b>C:</b> Provider initiates it, not patient.<br><b>D:</b> ABN = Medicare only.'}},
{t:'Denials vs Rejections',i:'❌',cl:'var(--rose)',
c:`<h3>❌ Denials vs Rejections vs Appeals</h3>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0">
<div class="g" style="border-top:3px solid var(--orange)"><h4 style="color:var(--orange)">Rejection</h4><p>Claim NOT processed. Failed front-end edits (invalid ID, missing DOB). Fix and resubmit.</p></div>
<div class="g" style="border-top:3px solid var(--rose)"><h4 style="color:var(--rose)">Denial</h4><p>Payer processed but refused to pay (no auth, not necessary, non-covered). May need appeal.</p></div>
<div class="g" style="border-top:3px solid var(--purple)"><h4 style="color:var(--purple)">Appeal</h4><p>Formal request to reconsider denial. Include supporting documentation within deadline.</p></div></div>
<div class="ib tr"><h4>⚠️ Trap</h4><p>Rejection = not processed (fix & resubmit). Denial = processed but not paid (may appeal). Do NOT confuse them.</p></div>`,
q:{q:'Claim returned because patient DOB is blank. This is a:',o:['Denial','Appeal','Rejection','Write-off'],a:2,r:'<b>C.</b> Missing data = front-end error = rejection. Never reached processing.<br><b>A:</b> Denial = payer processed and refused.<br><b>B:</b> Appeal responds to denial.<br><b>D:</b> Write-off = accounting adjustment.'}},
{t:'EOB, Posting & A/R Aging',i:'📄',cl:'var(--purple)',
c:`<h3>📄 EOB, Payment Posting & A/R Aging</h3>
<p><b>EOB:</b> Payer statement of how claim was processed. NOT a bill. Shows billed, allowed, paid, adjustments, patient responsibility.</p>
<p><b>Payment Posting:</b> Recording payments, adjustments, and patient balances from EOB/remittance advice.</p>
<p><b>A/R Aging:</b> Tracks unpaid balances: 0-30, 31-60, 61-90, 91-120, 120+ days.</p>
<p><b>Contractual Adjustment:</b> Difference between billed and allowed — patient does NOT pay this.</p>
<div class="ec"><h4 style="color:var(--purple)">💰 EOB Math Lab</h4><p>Billed: $200 | Allowed: $120 | Deductible remaining: $50 | Coinsurance: 20%</p>
<div class="er"><span>Patient pays deductible</span><span>$50</span></div><div class="er"><span>Remaining: $120-$50</span><span>$70</span></div><div class="er"><span>Coinsurance: 20%×$70</span><span>$14</span></div><div class="er"><span>Insurance pays: 80%×$70</span><span>$56</span></div><div class="er"><span>Contractual adj: $200-$120</span><span>$80</span></div><div class="er tot"><span>Patient total</span><span>$64</span></div></div>
<div class="ib tr"><h4>⚠️ Trap</h4><p>EOB ≠ bill. The EOB is from the payer. The bill/statement is from the provider office.</p></div>`,
q:{q:'Billed $300, Allowed $200, Deductible $0 remaining, Coinsurance 20%. Patient owes?',o:['$60','$40','$100','$300'],a:1,r:'<b>B ($40).</b> Deductible met. 20%×$200=$40.<br><b>A ($60):</b> 20% of billed ($300), not allowed.<br><b>C ($100):</b> Contractual adjustment, not patient cost.<br><b>D:</b> Patient never pays full billed with insurance.'}},
{t:'HIPAA & Billing Communication',i:'🔒',cl:'var(--lavender)',
c:`<h3>🔒 HIPAA, Release of Info & Communication</h3>
<p><b>PHI:</b> Any individually identifiable health info (name, DOB, diagnosis, billing, insurance).</p>
<p><b>Minimum Necessary:</b> Share only what is needed for the purpose.</p>
<p><b>TPO:</b> PHI may be shared for Treatment, Payment, Operations without specific authorization.</p>
<p><b>Release of Info:</b> Sharing outside TPO requires patient authorization.</p>
<p><b>HITECH:</b> Strengthened HIPAA enforcement, breach notifications, penalties.</p>
<p><b>Rules:</b> Verify identity before discussing billing by phone. Do not discuss PHI in public areas. Family members need authorization unless designated.</p>
<div class="g" style="background:rgba(11,16,38,.3)"><h4>📞 Scenarios</h4>
<p><b>Spouse calls about bill:</b> Check authorization on file. If none, cannot share.</p>
<p><b>Payer requests records for claim:</b> Verify caller. Share minimum necessary (TPO permitted).</p>
<p><b>Patient upset about denial:</b> Verify identity. Calmly explain denial, options (appeal), offer escalation.</p></div>
<div class="ib tr"><h4>⚠️ Trap</h4><p>TPO allows sharing with payers without authorization, but sharing with family/employers generally requires authorization.</p></div>`,
q:{q:'Payer rep calls requesting clinical notes for a claim. Under HIPAA, what should you do?',o:['Refuse all sharing','Verify caller and send only relevant records','Share entire medical record','Require patient to sign authorization first'],a:1,r:'<b>B.</b> Sharing with payer for payment = TPO = permitted. Verify caller, apply minimum necessary.<br><b>A:</b> Overly restrictive; TPO permits this.<br><b>C:</b> Violates minimum necessary.<br><b>D:</b> Unnecessary; TPO covers payer payment requests.'}},
];

/* === PRACTICE UI === */
let pI=0;
function bPQ(){let h=`<div class="g"><h2>✏️ Practice Questions</h2><p>${PQ.length} questions. Click question numbers to navigate. Flag questions for review.</p></div>`;
h+=`<div class="leg"><span><span class="ld" style="background:var(--ltblue)"></span> Unvisited</span><span><span class="ld" style="background:var(--royal)"></span> Current</span><span><span class="ld" style="background:var(--emerald)"></span> Correct</span><span><span class="ld" style="background:var(--rose)"></span> Missed</span><span><span class="ld" style="background:var(--gold)"></span> Flagged</span></div>`;
h+=`<div class="qm" id="pm"></div><div id="pc"></div>`;
document.getElementById('s6').innerHTML=h;rPQ()}
function rPQ(){
// map
let m='';PQ.forEach((_,i)=>{const ans=S.pa[i];const fl=S.pf[i];const cls=i===pI?'cu':fl?'fl':ans===true?'ok':ans===false?'no':'uv';m+=`<button class="qd ${cls}" onclick="pI=${i};rPQ()">${i+1}</button>`});
document.getElementById('pm').innerHTML=m;
const q=PQ[pI];const answered=S.pa[pI]!==undefined;
let h=`<div class="g" style="font-size:11px;color:var(--dim)">Q${pI+1}/${PQ.length} — ${q.tp}</div>`;
h+=`<div class="g"><div class="qb"><div class="qt">${q.q}</div>`;
q.o.forEach((o,i)=>{
const dis=answered?'dis':'';
const ok=answered&&q.a===i?'ok':'';
const no=answered&&S.pa[pI]===false&&S.ps&&S.ps[pI]===i?'no':'';
h+=`<button class="ob ${dis} ${ok} ${no}" onclick="aPQ(${i})">${'ABCD'[i]}. ${o}</button>`;
});
h+=`<div class="rt${answered?' show':''}" id="pr">${fmtR(q.r)}</div>`;
if(answered)h+=`<div class="strategyBox"><h4>🎯 Strategy from Hilary</h4><p>${q.st||topicStrategy(q.tp)}</p></div>`;
h+=`</div></div>`;
h+=`<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
<button class="btn bp" onclick="pI=Math.max(0,pI-1);rPQ()">← Prev</button>
<button class="btn bw" onclick="S.pf[pI]=!S.pf[pI];ss();rPQ()">⚑ Flag</button>
<button class="btn bp" onclick="pI=Math.min(PQ.length-1,pI+1);rPQ()">Next →</button></div>`;
document.getElementById('pc').innerHTML=h}
function aPQ(i){if(S.pa[pI]!==undefined)return;const ok=PQ[pI].a===i;S.pa[pI]=ok;S.ps=S.ps||{};S.ps[pI]=i;ss();uP();if(ok)pC();else pW();rPQ()}

function topicStrategy(tp){const m={
 'Insurance':'Do the money in the correct order: billed amount → allowed amount → remaining deductible → coinsurance/copay → patient responsibility. Never calculate from the billed amount unless the question says self-pay.',
 'Plans':'Look for the controlling plan rule: referral, network, deductible, or workplace injury. HMO/POS usually point to PCP/referral logic; PPO points to flexibility; EPO points to in-network only.',
 'Medicare':'Attach each Medicare letter to a real service: A = admitted/inpatient, B = outpatient/provider/DME, C = private Advantage plan, D = drugs.',
 'Modifiers':'Ask what extra information the code needs: side, eyelid/finger/toe location, bilateral, repeat, reduced service, separate E/M, or distinct procedure.',
 'HIPAA':'Before releasing any billing or clinical information, identify the purpose and verify the person. TPO allows payment-related sharing, but minimum necessary still controls.',
 'ICD':'ICD answers WHY. Outpatient uncertain language like rule out, suspected, possible, probable means code symptoms, not the unconfirmed diagnosis.',
 'Denials':'Rejection means the claim did not get processed; denial means the payer processed it and refused payment. That one distinction controls the next action.',
 'CMS':'Think like the claim form: ICD diagnosis letters A/B/C/D support CPT procedure lines through diagnosis pointers.',
 'Revenue':'Follow the money trail: front-end accuracy prevents back-end denial. Verify early, document clearly, code from documentation, submit cleanly, then follow up aging.',
 'A/R':'Older balances become more urgent. 90–120+ days means investigate immediately before filing limits or collection problems worsen.',
 'ABN':'ABN is Medicare-specific and must happen before the service when Medicare may deny for medical necessity.',
 'Prior Auth':'Authorization is permission to perform/bill; it is not a promise of payment. High-cost imaging, DME, surgery, and non-formulary drugs often trigger it.',
 'EOB':'EOB explains what the payer did; it is not a bill. Use allowed amount, adjustment, paid amount, and patient responsibility.',
 'CPT':'CPT answers WHAT service was done. If it is not documented, it should not be coded.',
 'CPT/HCPCS':'CPT = procedure/service. HCPCS Level II = supplies, DME, ambulance, and certain drugs.',
 'Financial':'Financial assistance language usually points to income, resources, sliding scale, charity care, or indigent care.',
 'Communication':'Start with privacy and calm control: verify identity, explain what happened, give the next action, and escalate when needed.',
 'EHR':'Accuracy beats speed. Confirm the correct patient, correct field, and exact insurance/clinical data before saving.'
};return m[tp]||'Identify the controlling clue in the stem, then eliminate every option by matching it to what it actually represents.'}

 const byQ={
 'HMO patient scheduled with orthopedic specialist. No referral number in chart. MA should:':'<b>B is correct.</b> HMO + specialist + no referral number is the controlling clue. The medical assistant should verify whether a referral is required and obtain/document it before the visit when needed. <br><b>A:</b> Collecting the copay handles payment at check-in, but it does not satisfy the referral rule and may still lead to denial. <br><b>C:</b> An appeal happens after a denial; this question is asking what prevents the denial before care. <br><b>D:</b> An ABN is a Medicare medical-necessity notice, not a referral tool for an HMO specialist visit.',
 'Which code set identifies the REASON patient was seen?':'<b>C is correct.</b> ICD-10-CM identifies the diagnosis, condition, symptom, or reason for the encounter — the “why.” <br><b>A:</b> CPT reports what service or procedure was performed, such as an office visit or test. <br><b>B:</b> HCPCS Level II reports supplies, DME, ambulance, and some drugs; it does not identify the diagnosis. <br><b>D:</b> POS codes identify where the service happened, such as office, ER, or inpatient hospital.',
 'Medicare patient wants screening that may not be covered. Before test, MA should:':'<b>B is correct.</b> A Medicare ABN must be signed before the service when Medicare may not cover it, so the patient can make an informed financial decision. <br><b>A:</b> Billing after the denial is too late; the patient was not warned before receiving the service. <br><b>C:</b> Submitting first to “see what happens” is not the ABN workflow. The notice must come before the service. <br><b>D:</b> Suggesting a plan switch is outside the immediate MA action and does not address today’s service.',
 'EOB is best described as:':'<b>B is correct.</b> An EOB explains how the payer processed a claim: billed amount, allowed amount, paid amount, adjustment, denial reasons, and patient responsibility. <br><b>A:</b> A provider bill or patient statement asks the patient to pay. An EOB explains payer processing and is not itself a bill. <br><b>C:</b> A referral document authorizes or directs specialty care; it does not explain claim payment. <br><b>D:</b> A prescription form is a medication order, not a payer payment explanation.',
 'Claim returned because DOB is missing. This is a:':'<b>B is correct.</b> A missing DOB is a front-end data problem, so the claim is rejected before full payer adjudication. Fix the missing information and resubmit. <br><b>A:</b> A denial means the payer processed the claim and refused payment for a coverage, medical necessity, authorization, or benefit reason. <br><b>C:</b> An appeal asks the payer to reconsider a denial; this claim has not been fully processed yet. <br><b>D:</b> A write-off is an accounting adjustment, not the status of a claim with missing demographic data.',
 'Modifier 25 is appended to:':'<b>C is correct.</b> Modifier 25 goes on the E/M code when the evaluation/management service is significant and separately identifiable from a same-day procedure. <br><b>A:</b> ICD codes report diagnoses and do not receive CPT modifiers. <br><b>B:</b> The procedure code may need another modifier, but modifier 25 specifically belongs on the E/M service. <br><b>D:</b> HCPCS supply codes can take certain modifiers, but 25 is not used to label a supply.',
 'Medicare Part B covers:':'<b>B is correct.</b> Part B is the outpatient/provider side of Medicare: office visits, outpatient services, preventive services, labs, and DME. <br><b>A:</b> Inpatient hospital care is Part A. <br><b>C:</b> Prescription drug coverage is Part D. <br><b>D:</b> Medicare Advantage is Part C, a private plan structure that bundles benefits.',
 'Patient has $2,000 deductible (paid $2,000). Allowed $500, 20% coinsurance. Owes:':'<b>C is correct.</b> The deductible is already met, so calculate coinsurance on the allowed amount: 20% × $500 = $100. <br><b>A:</b> $500 would be the full allowed amount, but the plan shares cost after deductible is met. <br><b>B:</b> $400 is the insurance share if the plan pays 80%; it is not the patient share. <br><b>D:</b> $0 ignores the coinsurance that still applies after deductible is met.',
 'Which plan typically requires PCP referral for specialists?':'<b>C is correct.</b> HMO plans typically require a primary care provider and referral for specialty care. <br><b>A:</b> PPO plans are more flexible and usually do not require referrals for specialists. <br><b>B:</b> EPO plans usually restrict the network but do not typically require referrals. <br><b>D:</b> HDHP describes deductible structure, not referral rules.',
 'Minimum necessary rule under HIPAA requires:':'<b>B is correct.</b> Minimum necessary means sharing only the information needed for the task or purpose. <br><b>A:</b> Sharing all records automatically exposes unnecessary PHI. <br><b>C:</b> Never sharing anything is too extreme; HIPAA allows appropriate sharing for treatment, payment, and operations. <br><b>D:</b> Written authorization is not required for every TPO disclosure, but minimum necessary still applies.',
 'In outpatient, "rule out" diagnosis should be coded as:':'<b>B is correct.</b> In outpatient coding, uncertain diagnoses such as rule out, suspected, probable, or possible are not coded as confirmed. Code the presenting symptoms instead. <br><b>A:</b> Coding the diagnosis would falsely report a condition the provider has not confirmed. <br><b>C:</b> V codes are ICD-9 language; current ICD-10-CM uses Z codes for factors such as screenings and history. <br><b>D:</b> The encounter still needs codes; use symptoms or the documented reason for the visit.',
 'Both ears procedure. Modifier:':'<b>B is correct.</b> Modifier 50 means bilateral — the procedure was performed on both sides. <br><b>A:</b> Modifier 25 is for a separate significant E/M service on the same day as a procedure. <br><b>C:</b> Modifier 59 indicates a distinct procedural service, not simply both sides. <br><b>D:</b> Modifier 76 means the same provider repeated a procedure.',
 'Diagnosis pointer on claim connects:':'<b>B is correct.</b> The diagnosis pointer links each CPT/HCPCS service line to the ICD diagnosis letter that supports medical necessity. <br><b>A:</b> Patient-to-plan connection is handled through insurance/member information, not the diagnosis pointer. <br><b>C:</b> Referral to specialist is a plan/access requirement, not a diagnosis pointer function. <br><b>D:</b> Copay and deductible are benefit design issues, not diagnosis-linking tools.'
 };
 PQ.forEach(q=>{if(byQ[q.q])q.r=byQ[q.q]});
}
strengthenPracticeRationales();

function applyReadabilityUpgrades(){
LS[0].c=`<div class="miniHero"><h3>🛡️ Insurance Fundamentals: click each box, then flip for the example</h3><p>Do not make students read a gray paragraph. Let them touch each term, see the meaning, then flip to a real billing example.</p></div>
<p class="scrollNote">Scroll sideways. Tap each card to flip between meaning and example.</p>
<div class="flipGrid insuranceFlip">
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">💵</span><b>Premium</b><small>Monthly payment to keep insurance active.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> The patient pays $320 every month even if she does not visit the doctor. This is not the amount due for today’s visit; it is the cost of having coverage.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">🧾</span><b>Deductible</b><small>Amount the patient pays before the plan starts sharing many costs.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> Deductible is $1,000. Patient has paid $700. A $200 allowed visit usually goes to the patient because the deductible is still not met.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">🎟️</span><b>Copay</b><small>Fixed visit amount, often collected at check-in.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> Card says PCP copay $25. The MA collects $25 at check-in unless the plan or office policy says otherwise.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">％</span><b>Coinsurance</b><small>Percentage of the allowed amount, usually after deductible.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> Allowed amount is $400 and coinsurance is 20%. Patient owes $80. The plan usually pays the remaining $320.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">🚧</span><b>Out-of-Pocket Max</b><small>The yearly limit on what the patient pays for covered services.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> After the patient reaches the out-of-pocket maximum, the plan pays 100% of covered in-network services for the rest of the plan year.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">✅</span><b>Allowed Amount</b><small>The payer’s approved amount. Use this for patient responsibility.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> Provider bills $500, payer allows $350. Coinsurance and deductible are calculated from $350, not $500.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">📉</span><b>Contractual Adjustment</b><small>The difference between billed and allowed. Patient does not pay it.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> Billed $500 and allowed $350. The $150 difference is adjusted off because of the payer contract.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">📄</span><b>EOB</b><small>Payer explanation of how the claim processed. Not a bill.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> EOB says allowed $120, paid $80, patient responsibility $40. The provider statement/bill comes from the office, not from the EOB itself.</small></div></div></div>
<div class="flipMini" onclick="this.classList.toggle('turned')"><div class="flipMiniInner"><div class="flipSide flipFront"><span class="emojiBig">🤝</span><b>COB</b><small>Coordination of Benefits decides primary and secondary payer.</small><p class="tapHint">tap for example</p></div><div class="flipSide flipBack"><small><b>Example:</b> Patient has two plans. The primary plan processes first; the secondary may process remaining allowed responsibility after primary.</small></div></div></div>
</div>
<div class="calcBox"><h4>💡 Quick Calculation Walkthrough</h4><p><b>Billed:</b> $500 | <b>Allowed:</b> $350 | <b>Deductible remaining:</b> $100 | <b>Coinsurance:</b> 20%</p><p>Patient pays $100 deductible first. Remaining allowed amount: $250. Coinsurance: 20% × $250 = $50. <b>Patient total = $150.</b></p></div>
<div class="teachGrid"><div class="teachBox blue"><h4>Exam rule</h4><p>Patient cost is based on the allowed amount, not the billed amount.</p></div><div class="teachBox orange"><h4>Common trap</h4><p>The billed amount looks important, but the payer contract controls what counts.</p></div><div class="teachBox green"><h4>Workplace action</h4><p>Verify benefits before the visit so deductible, copay, and coinsurance are not a surprise.</p></div></div>`;
LS[0].q.r='<b>B is correct.</b> The patient still has $200 left on the deductible, so the first $200 of the $300 allowed amount is patient responsibility. The remaining allowed amount is $100, and 20% coinsurance on $100 is $20. Total patient responsibility is $220, not $260. <br><b>Important correction:</b> The old answer choice listed $260 as correct, but that math is wrong. I corrected the lesson logic so students are not taught the wrong calculation. <br><b>A:</b> $200 counts only the remaining deductible and forgets the coinsurance after the deductible is met. <br><b>C:</b> $300 would make the patient pay the full allowed amount even though the plan should share the remaining $100. <br><b>D:</b> $60 is 20% of $300, but coinsurance is not applied to the full allowed amount before the deductible step.';
LS[0].q.o=['$200','$220','$300','$60'];
LS[0].q.a=1;
}

applyReadabilityUpgrades();
